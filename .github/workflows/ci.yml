name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Run pytest
        run: uv run pytest tests/ intervention/tests/ aristotle_mcp/tests/ -v --tb=short

      - name: Run static tests
        run: bash scripts/test.sh

  test-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run --filter '*' test

      - name: Type check (src only)
        run: |
          for pkg in packages/core packages/reflection packages/watchdog; do
            echo "=== $pkg ==="
            if [ -f "$pkg/tsconfig.ci.json" ]; then
              (cd "$pkg" && bunx tsc --noEmit --project tsconfig.ci.json)
            else
              (cd "$pkg" && bunx tsc --noEmit)
            fi
          done

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --python 3.12

      - name: Ruff check
        run: uv run ruff check aristotle_mcp/ tests/

      - name: Ruff format check
        run: |
          uv run ruff format aristotle_mcp/ tests/
          git diff --exit-code -- aristotle_mcp/ tests/
