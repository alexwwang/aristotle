name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --python 3.12

      - name: Run pytest
        run: uv run pytest test/ -v --tb=short

      - name: Run static tests
        run: bash test.sh

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check existing release
        id: existing
        continue-on-error: true
        run: |
          BODY=$(gh release view "${GITHUB_REF_NAME}" --json body -q '.body' 2>/dev/null || echo "")
          echo "has_body=${#BODY}" >> "$GITHUB_OUTPUT"
          # If body starts with "##" it's a hand-written release — preserve it
          if echo "$BODY" | head -1 | grep -q "^##"; then
            echo "preserve=true" >> "$GITHUB_OUTPUT"
          else
            echo "preserve=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        if: steps.existing.outputs.preserve != 'true'
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            BODY=$(git log --pretty=format:"- %s" HEAD)
          else
            BODY=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi
          echo "body<<EOFMARKER" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOFMARKER" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.existing.outputs.preserve != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: ${{ steps.notes.outputs.body }}

      - name: Preserve existing release notes
        if: steps.existing.outputs.preserve == 'true'
        run: |
          echo "📋 Hand-written release notes detected — skipping overwrite for ${GITHUB_REF_NAME}"
